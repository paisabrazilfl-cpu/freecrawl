version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://freecrawl:freecrawl@postgres:5432/freecrawl
      REDIS_URL: redis://redis:6379/0
      MAX_CONCURRENCY: "5"
      REQUEST_TIMEOUT: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: rq worker crawl --url redis://redis:6379/0
    environment:
      DATABASE_URL: postgresql://freecrawl:freecrawl@postgres:5432/freecrawl
      REDIS_URL: redis://redis:6379/0
      MAX_CONCURRENCY: "5"
      REQUEST_TIMEOUT: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # Wakes up every 10 minutes (loop mode, since Compose has no native cron)
  # to heartbeat, keep the API warm, and reap stalled crawl jobs.
  cron:
    build: .
    command: python -m app.cron --loop
    environment:
      DATABASE_URL: postgresql://freecrawl:freecrawl@postgres:5432/freecrawl
      REDIS_URL: redis://redis:6379/0
      SELF_URL: http://api:8000
      CRON_INTERVAL_SECONDS: "600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freecrawl
      POSTGRES_PASSWORD: freecrawl
      POSTGRES_DB: freecrawl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freecrawl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
